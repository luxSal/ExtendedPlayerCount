[package]
namespace = "YourName"
name      = "ExtendedPlayerCount"
versionNumber = "1.0.0"
description   = "Raises the Gatekeeper co-op lobby cap above the vanilla maximum of 4. Fully configurable via BepInEx config (default: 6, max: 16). All players in the session must have this mod installed."

websiteUrl = ""
containsNsfwContent = false

[build]
icon          = "icon.png"
readme        = "README.md"
outdir        = "build"

[[build.copy]]
source = "bin/Release/net6.0/ExtendedPlayerCount.dll"
target = "BepInEx/plugins/ExtendedPlayerCount/"

[publish]
communities = ["gatekeeper"]

[package.dependencies]
BepInEx-BepInExPack_IL2CPP = "6.0.733"
GatekeeperModding-GKAPI    = "1.0.0"
